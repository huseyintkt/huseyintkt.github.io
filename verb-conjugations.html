    <!-- MAIN START -->
    <div class="container">
        <div class="row pt-5">
            <div class="col-md-9">
                <div class="overflow-auto">
                    <!-- Butona her tiklandiginda h2 icerisine random bir fiil render edilecek -->
                    <h2 id="verb" class="text-center float-start"></h2>
                    <button id="btn-new-verb" class="btn btn-primary float-end">New Verb</button>
                    <hr class="mt-5">
                </div>
                <div class="row">
                    <!-- PRESENTE START-->
                    <div class="col-md-6 mb-5">
                        <p><strong>Presente</strong></p>
                        <div class="form-outline mb-4">
                            <input id="presente-io" type="text" class="form-control" />
                            <label class="form-label">Io</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="presente-tu" type="text" class="form-control" />
                            <label class="form-label">Tu</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="presente-lui-lei" type="text" class="form-control" />
                            <label class="form-label">Lui/Lei </label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="presente-noi" type="text" class="form-control" />
                            <label class="form-label">Noi</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="presente-voi" type="text" class="form-control" />
                            <label class="form-label">Voi</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="presente-loro" type="text" class="form-control" />
                            <label class="form-label">Loro</label>
                        </div>
                        <button id="show-presente" class="btn btn-primary">Show</button>
                        <button id="clear-presente" class="btn btn-info float-end">Clear</button>
                    </div>
                    <!-- PRESENTE END-->
                    <!-- PASSATO PROSSIMA START-->
                    <div class="col-md-6 mb-5">
                        <p><strong>Passato Prossimo</strong></p>
                        <div class="form-outline mb-4">
                            <input id="passato-prossimo-io" type="text" class="form-control" />
                            <label class="form-label">Io</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="passato-prossimo-tu" type="text" class="form-control" />
                            <label class="form-label">Tu</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="passato-prossimo-lui-lei" type="text" class="form-control" />
                            <label class="form-label">Lui/Lei </label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="passato-prossimo-noi" type="text" class="form-control" />
                            <label class="form-label">Noi</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="passato-prossimo-voi" type="text" class="form-control" />
                            <label class="form-label">Voi</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="passato-prossimo-loro" type="text" class="form-control" />
                            <label class="form-label">Loro</label>
                        </div>
                        <button id="show-passato-prossimo" class="btn btn-primary">Show</button>
                        <button id="clear-passato-prossimo" class="btn btn-info float-end">Clear</button>
                    </div>
                    <!-- PASSATO PROSSIMA END-->
                    <!-- FUTURO START-->
                    <div class="col-md-6 mb-5">
                        <p><strong>Futuro</strong></p>
                        <div class="form-outline mb-4">
                            <input id="futuro-semplice-io" type="text" class="form-control" />
                            <label class="form-label">Io</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="futuro-semplice-tu" type="text" class="form-control" />
                            <label class="form-label">Tu</label>
                        </div>
                        <div class="form-outline mb-4">
                            <input id="futuro-semplice-lui-lei" type="text" class="form-control" />

                        <div class="form-outline mb-4">

                        <div class="form-outline mb-4">
                            <input id="futuro-semplice-voi" type="text" class="form-control" />

                        </div>
                        <div class="form-outline mb-4">
                            <input id="futuro-semplice-loro" type="text" class="form-control" />
                            <label class="form-label">Loro</label>
                        </div>
                        <button id="show-futuro-semplice" class="btn btn-primary">Show</button>
                        <button id="clear-futuro-semplice" class="btn btn-info float-end">Clear</button>
                    </div>

                </div>
